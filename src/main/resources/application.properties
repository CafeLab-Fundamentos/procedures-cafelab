spring.application.name=Procedures-CafeLab

# PostgreSQL / Supabase (pooler :6543 = Supavisor)
# Si ves: FATAL (ENOIDENTIFIER) no tenant identifier provided
# el pooler necesita el proyecto: (1) usuario postgres.<REF> o (2) options=reference=<REF> en la URL (abajo).
# En Azure App Service define SUPABASE_PROJECT_REF (mismo id que tras "postgres." en el dashboard de Supabase).
# Alternativa estable en servidor: conexión directa :5432 (sin pooler), URL distinta en el panel de Supabase.
spring.datasource.url=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require&options=reference%3D${SUPABASE_PROJECT_REF}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=com.acme.procedurescafelab.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT
authorization.jwt.secret=WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days=7

# Eureka Client
eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761}/eureka
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${WEBSITE_HOSTNAME:localhost}

# Flyway
spring.flyway.enabled=false